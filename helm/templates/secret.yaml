apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: test-secret
  namespace: applications
spec:
  refreshInterval: "1s"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  data:
    {{- range $secret, $value := .Values.secretVars }}
    - secretKey: {{ $secret }}
      remoteRef:
        key: eso/{{ (split "/" (lower $value))._0 }}
        property: {{ (split "/" (lower $value))._1 }}
    {{ end -}}